<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #ffd6e8 0%, #fff0f6 40%, #ffe8fb 100%);
            color: #333;
        }

        .card {
            width: min(90vw, 420px);
            padding: 36px 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
            text-align: center;
            position: relative;
        }

        .heart {
            font-size: 52px;
            animation: beat 1.1s infinite ease-in-out;
        }

        h1 {
            margin: 20px 0 10px;
            color: #e91e63;
            font-size: 2rem;
        }

        h2 {
            margin: 22px 0 0;
            font-size: 1.2rem;
            color: #555;
        }

        p {
            color: #5a4a5f;
            line-height: 1.6;
            margin: 0 0 18px;
            font-size: 1rem;
        }

        .button-row {
            margin-top: 18px;
            position: relative;
            min-height: 64px;
        }

        .hosted-link {
            display: inline-block;
            margin-top: 14px;
            color: #e91e63;
            font-weight: 600;
            text-decoration: none;
        }

        .hosted-link:hover {
            text-decoration: underline;
        }

        .share-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 999px;
            background: #25D366;
            color: white;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(37, 211, 102, 0.25);
        }

        .share-btn:hover {
            background: #1ebe5b;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 14px 28px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        #yesBtn {
            background: #ff4f9a;
            color: #fff;
        }

        #yesBtn:hover {
            transform: translateY(-2px);
            background: #ff2f86;
        }

        #noBtn {
            background: #f7f7f7;
            color: #6b6b6b;
            position: absolute;
            top: 0;
            right: 0;
        }

        #smallText {
            margin: 18px 0 0;
            color: #8a7c91;
            font-size: 0.92rem;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 420px) {
            .card {
                padding: 28px 20px;
            }

            #noBtn {
                right: auto;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">💜</div>
        <h1>For You</h1>
        <p>
            I made this page because you always brighten my day. Open it whenever you want a little smile.
        </p>
        <a class="hosted-link" href="https://nelso.github.io/Git_Hub/" target="_blank" rel="noopener noreferrer">Open this page in your browser</a>
        <br>
        <a class="share-btn" href="https://wa.me/?text=Hi%20%F0%9F%91%8B%20I%20made%20something%20for%20you:%20https://nelso.github.io/Git_Hub/" target="_blank" rel="noopener noreferrer">Share with her on WhatsApp</a>
        <h2>Will you say yes?</h2>
        <div class="button-row">
            <button id="yesBtn">Yes 💕</button>
            <button id="noBtn">No</button>
        </div>
        <p id="smallText">Hint: the answer is already written in the heart.</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const smallText = document.getElementById('smallText');

        let noCount = 0;

        function moveNoButton() {
            noCount += 1;
            const maxX = window.innerWidth - noBtn.offsetWidth - 24;
            const maxY = window.innerHeight - noBtn.offsetHeight - 24;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;

            if (noCount === 1) {
                smallText.textContent = 'Mbona uakimbilia No?';
            } else if (noCount === 2) {
                smallText.textContent = 'No inakimbia, yes iko tayari.';
            } else if (noCount === 3) {
                smallText.textContent = 'Acha kucheza, finya yes.';
            } else {
                smallText.textContent = 'Yes tu, mpenzi.';
            }
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton, { passive: true });

        yesBtn.addEventListener('click', () => {
            window.open('https://nelso.github.io/Git_Hub/', '_blank', 'noopener,noreferrer');
        });
    </script>
</body>
</html>
