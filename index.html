<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Risper 💖</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #ffd6e8 0%, #fff0f6 40%, #ffe8fb 100%);
            color: #333;
            overflow: hidden;
        }

        .card {
            width: min(90vw, 420px);
            padding: 36px 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .card::before {
            content: "Risper";
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(2.8rem, 12vw, 4.8rem);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: rgba(233, 30, 99, 0.14);
            transform: rotate(-18deg);
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }

        .heart {
            font-size: 52px;
            animation: beat 1.1s infinite ease-in-out;
        }

        .surprise-art {
            margin: 8px 0 14px;
            font-size: 0.36rem;
            line-height: 0.95;
            white-space: pre;
            overflow-x: auto;
            color: #ff4f9a;
            font-family: Consolas, monospace;
        }

        h1 {
            margin: 20px 0 10px;
            color: #e91e63;
            font-size: 2rem;
        }

        h2 {
            margin: 22px 0 0;
            font-size: 1.2rem;
            color: #555;
        }

        p {
            color: #5a4a5f;
            line-height: 1.6;
            margin: 0 0 18px;
            font-size: 1rem;
        }

        .button-row {
            margin-top: 18px;
            position: relative;
            min-height: 64px;
        }

        .hosted-link {
            display: inline-block;
            margin-top: 14px;
            color: #e91e63;
            font-weight: 600;
            text-decoration: none;
        }

        .hosted-link:hover {
            text-decoration: underline;
        }

        .share-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 999px;
            background: #25D366;
            color: white;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(37, 211, 102, 0.25);
        }

        .share-btn:hover {
            background: #1ebe5b;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 14px 28px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        #yesBtn {
            background: #ff4f9a;
            color: #fff;
        }

        #yesBtn:hover {
            transform: translateY(-2px);
            background: #ff2f86;
        }

        #noBtn {
            background: #f7f7f7;
            color: #6b6b6b;
            position: absolute;
            top: 0;
            right: 0;
        }

        #smallText {
            margin: 18px 0 0;
            color: #8a7c91;
            font-size: 0.92rem;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 420px) {
            .card {
                padding: 28px 20px;
            }

            #noBtn {
                right: auto;
            }
        }
    </style>
</head>
